<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fangs - City Generator</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(66, 78, 140, 0.22), transparent 42%),
        linear-gradient(180deg, #11172b 0%, #090d18 100%);
      color: #d3d7e6;
    }

    #controls {
      width: 900px;
      max-width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 16px 18px;
      border: 1px solid rgba(160, 175, 218, 0.2);
      border-radius: 10px;
      background: rgba(12, 18, 32, 0.78);
      backdrop-filter: blur(8px);
    }

    .controls-left,
    .controls-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-left {
      flex: 1 1 420px;
      min-width: min(100%, 320px);
    }

    .controls-right {
      flex: 0 0 220px;
      align-items: stretch;
    }

    .panel-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .panel-copy strong {
      font-size: 14px;
      color: #f2f5ff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .panel-copy span,
    #seed-readout {
      font-size: 12px;
      color: #9ca6c7;
    }

    #control-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 10px 12px;
    }

    .control-row {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(160, 175, 218, 0.14);
      border-radius: 8px;
      background: rgba(20, 27, 47, 0.52);
    }

    .control-label {
      font-size: 11px;
      color: #d9e1ff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .control-value {
      min-width: 34px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(91, 108, 168, 0.22);
      color: #eff3ff;
      font-size: 11px;
      text-align: center;
    }

    .control-slider {
      width: 100%;
      accent-color: #91a4ff;
    }

    .status-copy {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(160, 175, 218, 0.14);
      border-radius: 8px;
      background: rgba(20, 27, 47, 0.52);
    }

    #seed-readout {
      line-height: 1.5;
    }

    #regenerate-btn {
      border: 1px solid rgba(145, 164, 255, 0.24);
      border-radius: 8px;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(92, 111, 181, 0.9), rgba(63, 78, 134, 0.9));
      color: #f4f7ff;
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    #regenerate-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.28);
    }

    #regenerate-btn:disabled {
      opacity: 0.58;
      cursor: default;
      box-shadow: none;
    }

    #time-controls {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 4px;
      border-top: 1px solid rgba(160, 175, 218, 0.12);
    }

    #panel-toggle {
      border: 1px solid rgba(160, 175, 218, 0.2);
      border-radius: 6px;
      padding: 6px 10px;
      background: rgba(20, 27, 47, 0.52);
      color: #9ca6c7;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 120ms ease;
    }

    #panel-toggle:hover {
      color: #f2f5ff;
    }

    .time-btn {
      border: 1px solid rgba(160, 175, 218, 0.2);
      border-radius: 6px;
      padding: 6px 12px;
      background: rgba(20, 27, 47, 0.52);
      color: #9ca6c7;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }

    .time-btn:hover {
      color: #f2f5ff;
    }

    .time-btn[data-active="true"] {
      background: linear-gradient(180deg, rgba(92, 111, 181, 0.9), rgba(63, 78, 134, 0.9));
      color: #f4f7ff;
      border-color: rgba(145, 164, 255, 0.4);
    }

    .day-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px;
    }

    .day-display__phase {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f2f5ff;
    }

    .day-display__phase--dangerous {
      color: #ffb060;
    }

    .day-display__timeline {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .day-display__track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(181, 190, 227, 0.16);
      background:
        linear-gradient(
          90deg,
          rgba(42, 50, 96, 0.96) 0,
          rgba(18, 22, 45, 0.96) var(--day-start-percent),
          rgba(235, 173, 84, 0.92) var(--day-start-percent),
          rgba(255, 211, 125, 0.92) 100%
        );
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.06),
        inset 0 -2px 4px rgba(0, 0, 0, 0.28);
    }

    .day-display__boundary {
      position: absolute;
      top: -1px;
      bottom: -1px;
      left: var(--day-start-percent);
      width: 2px;
      background: rgba(255, 244, 199, 0.72);
      box-shadow: 0 0 10px rgba(255, 210, 138, 0.38);
      transform: translateX(-50%);
    }

    .day-display__divider {
      position: absolute;
      top: 1px;
      bottom: 1px;
      left: var(--divider-percent);
      width: 1px;
      background: rgba(231, 237, 255, 0.28);
      transform: translateX(-50%);
    }

    .day-display__divider--day {
      background: rgba(92, 60, 12, 0.26);
    }

    .day-display__thumb {
      position: absolute;
      top: 50%;
      left: var(--time-percent);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(247, 250, 255, 0.96);
      background: #eef4ff;
      box-shadow:
        0 0 0 2px rgba(9, 13, 24, 0.42),
        0 0 12px rgba(178, 194, 255, 0.45);
      transform: translate(-50%, -50%);
      transition:
        left 140ms linear,
        background 140ms ease,
        box-shadow 140ms ease,
        border-color 140ms ease;
    }

    .day-display__thumb--dangerous {
      border-color: rgba(255, 243, 234, 0.98);
      background: #ffb060;
      box-shadow:
        0 0 0 2px rgba(9, 13, 24, 0.42),
        0 0 14px rgba(255, 176, 96, 0.65);
    }

    .day-display__labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7f8ab1;
    }

    .day-display__date {
      font-size: 10px;
      color: #9ca6c7;
    }

    #controls.collapsed .controls-left,
    #controls.collapsed .controls-right {
      display: none;
    }

    #controls.collapsed {
      padding-bottom: 12px;
    }

    #city-canvas {
      width: 900px;
      max-width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(160, 175, 218, 0.18);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    #player-panel {
      width: 900px;
      max-width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid rgba(160, 175, 218, 0.2);
      border-radius: 12px;
      background: rgba(12, 18, 32, 0.72);
      backdrop-filter: blur(8px);
    }

    .player-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 12px 11px;
      border: 1px solid rgba(160, 175, 218, 0.16);
      border-radius: 10px;
      background: rgba(20, 27, 47, 0.58);
      color: #e8ecff;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      text-align: left;
    }

    .player-card:hover {
      transform: translateY(-1px);
      border-color: rgba(183, 195, 255, 0.34);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .player-card[data-selected="true"] {
      border-color: rgba(180, 193, 255, 0.58);
      box-shadow: 0 0 0 1px rgba(180, 193, 255, 0.18), 0 0 22px rgba(128, 155, 255, 0.18);
    }

    .player-card__top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-card__swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex: 0 0 auto;
      box-shadow: 0 0 12px currentColor;
    }

    .player-card__title {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f3f6ff;
    }

    .player-card__status {
      font-size: 11px;
      line-height: 1.45;
      color: #aab4d8;
    }

    .player-card__blood {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #8e9cc8;
    }

    .player-card__blood-label,
    .player-card__blood-value {
      white-space: nowrap;
    }

    .player-card__blood-value {
      color: #edf1ff;
      font-variant-numeric: tabular-nums;
    }

    .blood-bar {
      position: relative;
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(161, 101, 113, 0.4);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(66, 18, 30, 0.9), rgba(31, 9, 15, 0.96));
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.05),
        inset 0 -2px 4px rgba(0, 0, 0, 0.3);
    }

    .blood-bar__fill {
      display: block;
      width: var(--blood-fill-percent, 100%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6e091d 0%, #b3152f 55%, #ff4161 100%);
      box-shadow: 0 0 16px rgba(255, 60, 96, 0.35);
      transition: width 180ms linear, filter 180ms ease;
    }

    .blood-bar[data-hungry="true"] {
      border-color: rgba(255, 91, 118, 0.78);
      background: linear-gradient(180deg, rgba(77, 16, 31, 0.96), rgba(36, 8, 15, 0.98));
    }

    .blood-bar[data-hungry="true"] .blood-bar__fill {
      background: linear-gradient(90deg, #ff2244 0%, #ff4d67 55%, #ffd0d8 100%);
      box-shadow: 0 0 18px rgba(255, 68, 102, 0.58);
    }

    .hunger-notice {
      padding: 6px 8px;
      border: 1px solid rgba(255, 92, 122, 0.35);
      border-radius: 8px;
      background: rgba(87, 15, 32, 0.52);
      color: #fff0f3;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hunt-status {
      padding: 6px 8px;
      border: 1px solid rgba(255, 90, 120, 0.2);
      border-radius: 8px;
      background: rgba(78, 15, 31, 0.32);
      color: #ffd3dc;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .player-card__hint {
      font-size: 10px;
      color: #7f8ab1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .player-panel-empty {
      padding: 12px 6px;
      font-size: 12px;
      color: #9ca6c7;
    }

    @media (max-width: 760px) {
      #control-panel {
        grid-template-columns: 1fr;
      }

      .controls-right {
        flex-basis: 100%;
      }

      .control-row {
        grid-template-columns: auto auto;
      }

      .control-slider {
        grid-column: 1 / -1;
      }

      #time-controls {
        flex-wrap: wrap;
      }

      .day-display {
        order: 3;
        flex: 1 0 100%;
        padding: 4px 0 0;
      }

      #player-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="controls" class="collapsed">
    <div class="controls-left">
      <div class="panel-copy">
        <strong>Fangs Prototype</strong>
        <span>Stage 1 milestone: seeded city generation with BFS-driven street walkers</span>
      </div>
      <div id="control-panel"></div>
    </div>

    <div class="controls-right">
      <div class="status-copy">
        <span id="seed-readout" aria-live="polite"></span>
      </div>
      <button id="regenerate-btn" type="button">In Sync</button>
    </div>

    <div id="time-controls">
      <button id="panel-toggle" type="button" aria-label="Toggle panel" aria-expanded="false">▼</button>
    </div>
  </div>

  <canvas id="city-canvas" width="900" height="700"></canvas>
  <div id="player-panel" aria-label="Player characters"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
